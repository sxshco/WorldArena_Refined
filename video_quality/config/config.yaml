    raft: ../checkpoints/raft/raft-things.pth
  dynamic_degree:
    raft: ../checkpoints/raft/raft-things.pth
  flow_score:
    raft: ../checkpoints/raft/raft-things.pth
  photometric_smoothness:
    cfg: ../WorldArena/third_party/SEA-RAFT/config/eval/spring-M.json
    model: ../checkpoints/photometric/Tartan-C-T-TSKH-spring540x960-M.pth
  motion_smoothness:
    model: ../checkpoints/motion/VFIMamba.pkl
  image_quality:
    musiq: ../checkpoints/pyiqa/musiq_spaq_ckpt-358bb6af.pth
